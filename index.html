        const DeepSeekIcon = ({ className, active = true }) => (

        const RouterIcon = ({ className, active = true, theme }) => (

        const MetaIcon = ({ className, active = true }) => (
            <img src="https://i.ibb.co/Q7fB6grM/image.png" className={`${className} transition-all duration-300 ${!active ? 'grayscale opacity-40' : ''}`} alt="Meta" draggable="false" />

        const ProviderIcon = ({ provider, className, active = true, theme }) => {
            if (provider === 'chatgpt') return <ChatGPTIcon className={className} active={active} />;
            if (provider === 'deepseek') return <DeepSeekIcon className={className} active={active} />;
            if (provider === 'free') return <FreeOptionIcon className={className} active={active} />;
            if (provider === 'router') return <RouterIcon className={className} active={active} theme={theme} />;
            if (provider === 'gemma') return <GemmaIcon className={className} active={active} />;
            if (provider === 'meta') return <MetaIcon className={className} active={active} />;
            return <GeminiIcon className={className} active={active} />;
        };

        const DB_NAME = 'GeminiChatDB';
        const STORE_NAME = 'chats';
        const DB_VERSION = 1;

        const db = {
            open: () => new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onupgradeneeded = (e) => {
                    const dbInstance = e.target.result;
                    if (!dbInstance.objectStoreNames.contains(STORE_NAME)) dbInstance.createObjectStore(STORE_NAME, { keyPath: 'id' });
                };
                request.onsuccess = (e) => resolve(e.target.result);
                request.onerror = (e) => reject(e.target.error);
            }),
            saveChats: async (chats) => {
                const database = await db.open();
                return new Promise((resolve, reject) => {
                    const tx = database.transaction(STORE_NAME, 'readwrite');
                    tx.objectStore(STORE_NAME).put({ id: 'all_chats', data: chats });
                    tx.oncomplete = () => resolve();
                    tx.onerror = (e) => reject(e.target.error);
                });
            },
            getChats: async () => {
                const database = await db.open();
                return new Promise((resolve, reject) => {
                    const tx = database.transaction(STORE_NAME, 'readonly');
                    const request = tx.objectStore(STORE_NAME).get('all_chats');
                    request.onsuccess = () => resolve(request.result ? request.result.data : []);
                    request.onerror = (e) => reject(e.target.error);
                });
            },
            clear: async () => {
                const database = await db.open();
                return new Promise((resolve, reject) => {
                    const tx = database.transaction(STORE_NAME, 'readwrite');
                    tx.objectStore(STORE_NAME).clear();
                    tx.oncomplete = () => resolve();
                    tx.onerror = (e) => reject(e.target.error);
                });
            }
        };

        class ErrorBoundary extends Component {
            constructor(props) { super(props); this.state = { hasError: false, error: null }; }
            static getDerivedStateFromError(error) { return { hasError: true, error }; }
            componentDidCatch(error, errorInfo) { console.error("React Error:", error, errorInfo); }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="flex items-center justify-center h-screen flex-col text-red-400 p-4 text-center bg-[#131314]">
                            <h2 className="text-2xl font-bold mb-2">Ошибка приложения</h2>
                            <p className="text-sm opacity-80 mb-4">{String(this.state.error)}</p>
                            <button onClick={() => { safeStorage.removeItem('gemini_language'); window.location.reload(); }} className="px-4 py-2 bg-[var(--accent-blue)] text-black rounded-full mt-4 font-semibold">Сбросить настройки и перезагрузить</button>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        const translations = {

        const MarkdownRenderer = ({ content }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                if (!containerRef.current) return;
                if (!content) { containerRef.current.innerHTML = ''; return; }
                try {
                    const safeContent = String(content);
                    let html = marked.parse(safeContent);
                    const apply = (rawHtml) => {
                        // ИСПРАВЛЕНО: санитизация через DOMPurify (защита от XSS)
                        const clean = window.DOMPurify ? window.DOMPurify.sanitize(rawHtml) : rawHtml;
                        containerRef.current.innerHTML = clean;
                        // ИСПРАВЛЕНО: рендер LaTeX-формул через KaTeX
                        if (window.renderMathInElement) {
                            try {
                                window.renderMathInElement(containerRef.current, {
                                    delimiters: [
                                        { left: '$$', right: '$$', display: true },
                                        { left: '$', right: '$', display: false },
                                        { left: '\\(', right: '\\)', display: false },
                                        { left: '\\[', right: '\\]', display: true }
                                    ],
                                    throwOnError: false
                                });
                            } catch (e) { /* ignore katex errors */ }
                        }
                    };
                    if (html instanceof Promise) html.then(apply);
                    else apply(html);
                } catch {
                    containerRef.current.innerText = String(content);
                }
            }, [content]);
            return <div ref={containerRef} className="markdown-body text-[15px] border-none leading-7" />;
        };

        const BotIcon = ({ className }) => (
            <svg className={className} viewBox="0 0 24 24" fill="none" stroke="var(--accent-blue)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
