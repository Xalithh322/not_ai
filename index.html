        // --- IndexedDB Wrapper ---
        const DB_NAME = 'GeminiChatDB';
        const STORE_NAME = 'chats';
        const DB_VERSION = 1;

        const db = {
            open: () => {
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open(DB_NAME, DB_VERSION);
                    request.onupgradeneeded = (e) => {
                        const db = e.target.result;
                        if (!db.objectStoreNames.contains(STORE_NAME)) {
                            db.createObjectStore(STORE_NAME, { keyPath: 'id' });
                        }
                    };
                    request.onsuccess = (e) => resolve(e.target.result);
                    request.onerror = (e) => reject(e.target.error);
                });
            },
            saveChats: async (chats) => {
                const database = await db.open();
                return new Promise((resolve, reject) => {
                    const tx = database.transaction(STORE_NAME, 'readwrite');
                    const store = tx.objectStore(STORE_NAME);
                    store.put({ id: 'all_chats', data: chats }); 
                    tx.oncomplete = () => resolve();
                    tx.onerror = (e) => reject(e.target.error);
                });
            },
            getChats: async () => {
                const database = await db.open();
                return new Promise((resolve, reject) => {
                    const tx = database.transaction(STORE_NAME, 'readonly');
                    const store = tx.objectStore(STORE_NAME);
                    const request = store.get('all_chats');
                    request.onsuccess = () => resolve(request.result ? request.result.data : []);
                    request.onerror = (e) => reject(e.target.error);
                });
            },
            clear: async () => {
                const database = await db.open();
                return new Promise((resolve, reject) => {
                    const tx = database.transaction(STORE_NAME, 'readwrite');
                    tx.objectStore(STORE_NAME).clear();
                    tx.oncomplete = () => resolve();
                });
            }
        };

        // --- Error Boundary ---
        class ErrorBoundary extends Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null };
            }
            static getDerivedStateFromError(error) { return { hasError: true, error }; }
            componentDidCatch(error, errorInfo) { console.error("React Error:", error, errorInfo); }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="flex items-center justify-center h-screen flex-col text-red-400 p-4 text-center">
                            <h2 className="text-2xl font-bold mb-2">Ошибка приложения</h2>
                            <p className="text-sm opacity-80 mb-4">{String(this.state.error)}</p>
                            <button onClick={() => window.location.reload()} className="px-4 py-2 bg-[var(--accent-blue)] text-black rounded-full mt-4">Перезагрузить</button>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        const MarkdownRenderer = ({ content }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                if (!containerRef.current) return;
                if (!content) {
                    containerRef.current.innerHTML = '';
                    return;
                }
                try {
                    const safeContent = String(content);
                    let html = marked.parse(safeContent);
                    if (html instanceof Promise) html.then(res => containerRef.current.innerHTML = res);
                    else containerRef.current.innerHTML = html;
                } catch { 
                    containerRef.current.innerText = String(content); 
                }
            }, [content]);
            return <div ref={containerRef} className="markdown-body text-[15px] border-none leading-7" />;
        };

            }, []);

            useEffect(() => {
                if (safeMode) document.title = "Workspace";
                else document.title = tabTitle || "AI Workspace";
            }, [safeMode, tabTitle]);

            useEffect(() => {
                if (isSettingsOpen || isMemoryModalOpen) {
                    const timer = setTimeout(() => {

                    }, 50);
                    return () => clearTimeout(timer);
                }

            const fetchBalance = async () => {
                if (!apiKey) {
                    setBalanceData(null);
                    return;
                }
                try {
                    const res = await fetch("https://openrouter.ai/api/v1/auth/key", {
                        method: 'GET',
                        headers: { 
                            'Authorization': `Bearer ${apiKey}`,
                            'Content-Type': 'application/json' 
                        }
                    });
                    const data = await res.json();
                    if (data && data.data) {
                        const { limit, usage } = data.data;
                        setBalanceData({
                            limit: limit !== null ? Number(limit) : 0,
                            usage: usage !== null ? Number(usage) : 0
                        });
                    }
                } catch (e) {
                    console.error("Balance fetch error:", e);
                    setBalanceData(null);
                }
            };

            useEffect(() => {
                fetchBalance();
            }, [apiKey]);

            useEffect(() => {
                const loadChats = async () => {
                    try {
                        const savedChats = await db.getChats();
                        if (!savedChats || savedChats.length === 0) {
                            const legacy = localStorage.getItem('gemini_chats_v4');
                            if (legacy) {
                                const parsedLegacy = JSON.parse(legacy);
                                setChats(parsedLegacy);
                                if (parsedLegacy.length) setActiveChatId(parsedLegacy[0].id);
                                else createNewChat();
                            } else {
                                createNewChat();
                            }
                        } else {
                            setChats(savedChats);
                            if (savedChats.length) setActiveChatId(savedChats[0].id);
                            else createNewChat();
                        }
                    } catch (e) {
                        console.error("DB Load Error", e);
                        createNewChat();
                    } finally {
                        setIsChatsLoaded(true);
                    }
                };
                loadChats();
            }, []);

            useEffect(() => {
                if (isChatsLoaded) { 
                    const timer = setTimeout(() => {
                        db.saveChats(chats).catch(e => console.error("Save Error", e));
                    }, 500); 
                    return () => clearTimeout(timer);
                }
            }, [chats, isChatsLoaded]);

            // ── FIX: auto-scroll only when user hasn't scrolled up ──
            useEffect(() => {
                if (!isUserScrolledUp.current && chatContainerRef.current) {
                    chatContainerRef.current.scrollTop = chatContainerRef.current.scrollHeight;
                }
            }, [chats, isLoading]);

            useEffect(() => {
                if (textareaRef.current) {
                    textareaRef.current.style.height = 'auto';
                    textareaRef.current.style.height = `${Math.min(textareaRef.current.scrollHeight, 200)}px`;
                    if (!input) textareaRef.current.style.height = 'auto'; 
                }
            }, [input]);

            const activeChat = useMemo(() => chats.find(c => c.id === activeChatId), [chats, activeChatId]);

            const saveNickname = (name) => {
                const finalName = name.trim() || t.guest;
                setNickname(finalName);
                localStorage.setItem('gemini_nickname', finalName);
                setIsWelcomeModalOpen(false);
            };

            const openSettings = () => {
                setTempTheme(theme);
                setTempLanguage(language);
                setTempNickname(nickname);
                setTempTabTitle(tabTitle);
                setTempApiKey(apiKey);
                setTempProvider(provider);
                setIsSettingsOpen(true);
            };

            const saveSettings = () => {
                const finalName = tempNickname.trim() || t.guest;
                const finalTab = tempTabTitle.trim() || t.tabTitlePlaceholder;
                setTheme(tempTheme);
                setLanguage(tempLanguage);
                setNickname(finalName);
                setTabTitle(finalTab);
                setApiKey(tempApiKey);
                setProvider(tempProvider);
                localStorage.setItem('gemini_nickname', finalName);
                localStorage.setItem('gemini_tab_title', finalTab);
                localStorage.setItem('gemini_user_api_key', tempApiKey);
                localStorage.setItem('app_provider', tempProvider);
                setIsSettingsOpen(false);
                fetchBalance(); 
            };

            const clearAllHistory = async () => {
                if(confirm(language === 'ru' ? "Удалить ВСЮ историю из базы данных? Это нельзя отменить." : "Delete ALL history? This cannot be undone.")) {
                    await db.clear();
                    localStorage.removeItem('gemini_chats_v4'); 
                    setChats([]);
                    createNewChat();
                    setIsSettingsOpen(false);
                }
            };

            const openMemoryModal = () => {
                setTempSystemInstruction(systemInstruction);
                setIsSettingsOpen(false);
                setIsMemoryModalOpen(true);
            };

            const saveMemory = () => {
                setSystemInstruction(tempSystemInstruction);
                localStorage.setItem('gemini_system_instruction', tempSystemInstruction);
                setIsMemoryModalOpen(false);
            };

            const createNewChat = () => {
                const currentChat = chats.find(c => c.id === activeChatId);
                if (currentChat && currentChat.messages.length === 0) {
                    setIsSidebarOpen(false);
                    setInput('');
                    return; 
                }
                const newChat = { id: Date.now().toString(), title: t.newChat, messages: [], timestamp: Date.now() };
                setChats(prev => [newChat, ...prev]);
                setActiveChatId(newChat.id);
                setIsSidebarOpen(false);
            };

            const handleSwitchChat = (targetId) => {
                if (activeChatId === targetId) return; 
                const currentChat = chats.find(c => c.id === activeChatId);
                if (currentChat && currentChat.messages.length === 0) {
                    setChats(prev => prev.filter(c => c.id !== activeChatId));
                }
                setActiveChatId(targetId);
                setIsSidebarOpen(false);
            };

            const deleteChat = (e, id) => {
                e.stopPropagation();
                const filtered = chats.filter(c => c.id !== id);
                setChats(filtered);
                if (activeChatId === id) {
                    if (filtered.length) setActiveChatId(filtered[0].id);
                    else createNewChat();
                }
            };

            const handleStopGeneration = () => {
                if (abortControllerRef.current) {
                    abortControllerRef.current.abort();
                    abortControllerRef.current = null;
                    setIsLoading(false);
                    setIsGenerating(false);
                    setChats(prev => prev.map(c => {
                        if (c.id === activeChatId) {
                            const newMsgs = [...c.messages];
                            if (newMsgs.length > 0 && newMsgs[newMsgs.length - 1].isThinking) {
                                newMsgs[newMsgs.length - 1].isThinking = false;
                            }
                            return { ...c, messages: newMsgs };
                        }
                        return c;
                    }));
                }
            };

            // ── FIX: direction-aware scroll handler ──
            const handleChatScroll = () => {
                if (!chatContainerRef.current) return;
                const { scrollTop, scrollHeight, clientHeight } = chatContainerRef.current;
                const distanceFromBottom = scrollHeight - scrollTop - clientHeight;
                const isScrollingUp = scrollTop < lastScrollTopRef.current;
                lastScrollTopRef.current = scrollTop;

                if (isScrollingUp && distanceFromBottom > 80) {
                    // User deliberately scrolled up — pause auto-scroll
                    isUserScrolledUp.current = true;
                } else if (distanceFromBottom < 40) {
                    // Close to bottom — resume auto-scroll
                    isUserScrolledUp.current = false;
                }
            };

            const handlePaste = (e) => {
                const items = e.clipboardData?.items;
                if (!items) return;
                for (let i = 0; i < items.length; i++) {
                    if (items[i].type.indexOf('image') !== -1) {
                        const file = items[i].getAsFile();
                        if (file) {
                            const reader = new FileReader();
                            reader.onload = (event) => {
                                setAttachments(prev => [...prev, { base64: event.target.result, name: file.name || 'image.png' }]);
                            };
                            reader.readAsDataURL(file);
                        }
                    }
                }
            };

            const handleFileChange = (e) => {
                const files = Array.from(e.target.files);
                files.forEach(file => {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        setAttachments(prev => [...prev, { base64: event.target.result, name: file.name }]);
                    };
                    reader.readAsDataURL(file);
                });
                e.target.value = null;
            };

            const generateChatTitle = async (chatId, userMessage) => {
                try {
                    const modelName = provider === 'gemini' ? 'google/gemini-3-flash-preview' : 'openai/gpt-4o-mini';
                    const prompt = `Generate a very short, concise, and natural title (maximum 3-5 words) for a chat that starts with the message below. The title must be in the same language as the message. Do not use quotes. Message: "${userMessage.slice(0, 500)}"`;
                    
                    const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                        method: 'POST',
                        headers: { 
                            'Authorization': `Bearer ${apiKey}`,
                            'Content-Type': 'application/json' 
                        },
                        body: JSON.stringify({ 
                            model: modelName,
                            messages: [{ role: 'user', content: prompt }]
                        })
                    });
                    const data = await res.json();
                    const newTitle = data.choices?.[0]?.message?.content?.trim()?.replace(/^["']|["']$/g, '');
                    if (newTitle) setChats(prev => prev.map(c => c.id === chatId ? { ...c, title: newTitle } : c));
                } catch (e) { console.error("Title Gen Error:", e); }
            };

            const pollCost = async (genId, chatId, messageIdx) => {
                const maxAttempts = 50;
                let currentAttempt = 0;

                const check = async () => {
                    if (currentAttempt >= maxAttempts) return;
                    
                    try {
                        const costRes = await fetch(`https://openrouter.ai/api/v1/generation?id=${genId}`, {
                            headers: { 'Authorization': `Bearer ${apiKey}` }
                        });
                        const costData = await costRes.json();
                        const cost = costData.data?.total_cost;
                        
                        if (cost !== undefined && cost !== null && cost > 0) {
                            setChats(prev => prev.map(c => {
                                if (c.id === chatId) {
                                    const newMessages = [...c.messages];
                                    if (newMessages[messageIdx]) {
                                        newMessages[messageIdx] = { ...newMessages[messageIdx], cost: cost };
                                    }
                                    return { ...c, messages: newMessages };
                                }
                                return c;
                            }));
                            return; 
                        }
                    } catch (err) {
                        console.error("Cost polling error:", err);
                    }

                    currentAttempt++;
                    setTimeout(check, 1000); 
                };

                check();
            };

            const sendMessage = async () => {
                if ((!input.trim() && attachments.length === 0) || !apiKey) return;
                
                // ── FIX: always jump to bottom and unlock auto-scroll on send ──
                isUserScrolledUp.current = false;
                lastScrollTopRef.current = 0;
                if (chatContainerRef.current) {
                    chatContainerRef.current.scrollTop = chatContainerRef.current.scrollHeight;
                }
                
                const userText = input;
                const activeAttachments = [...attachments];
                const isFirstMessage = activeChat?.messages.length === 0;
                const currentChatId = activeChatId;
                const currentProvider = provider;
                const currentProviderName = providerName;

                setInput(''); 
                setAttachments([]);

                if (activeAttachments.length > 0 && (currentProvider === 'deepseek' || (currentProvider === 'free' && modelType === 'flash'))) {
                    setChats(prev => prev.map(chat => {
                        if (chat.id === currentChatId) {
                            const title = chat.messages.length === 0 ? "Изображение" : chat.title;
                            return {
                                ...chat,
                                title,
                                messages: [
                                    ...chat.messages,
                                    { role: 'user', text: userText, attachments: activeAttachments },
                                    { 
                                        role: 'model', 
                                        text: language === 'ru' ? `⚠️ **Ошибка:** Выбранная нейросеть не поддерживает работу с фотографиями. Пожалуйста, отправляйте только текст или выберите другую модель (например, Gemini, ChatGPT, Llama 3.3 или Gemma 4).` : `⚠️ **Error:** The selected model does not support images. Please send text only or select another model (e.g., Gemini, ChatGPT, Llama 3.3, or Gemma 4).`,
                                        isError: true, 
                                        provider: currentProvider 
                                    }
                                ]
                            };
                        }
                        return chat;
                    }));
                    return;
                }

                setIsLoading(true); 
                setIsGenerating(true); 

                setChats(prev => prev.map(chat => {
                    if (chat.id === currentChatId) {
                        const title = chat.messages.length === 0 ? (userText.slice(0, 30) || "Image upload") : chat.title;
                        return {
                            ...chat, 
                            title, 
                            messages: [
                                ...chat.messages, 
                                { role: 'user', text: userText, attachments: activeAttachments },
                                { role: 'model', text: '', isThinking: true, provider: currentProvider, modelType: modelType, actualModel: "", cost: 0 }
                            ]
                        };
                    }
                    return chat;
                }));

                if (isFirstMessage && userText) generateChatTitle(currentChatId, userText);

                const controller = new AbortController();
                abortControllerRef.current = controller;

                try {
                    let modelName = "";
                    if (provider === 'gemini') {
                        modelName = modelType === 'pro' ? 'google/gemini-3.1-pro-preview' : 'google/gemini-3-flash-preview';
                    } else if (provider === 'chatgpt') {
                        modelName = modelType === 'pro' ? 'openai/o4-mini' : 'openai/gpt-5.4-mini';
                    } else if (provider === 'deepseek') {
                        modelName = modelType === 'pro' ? 'deepseek/deepseek-r1' : 'deepseek/deepseek-chat-v3.1';
                    } else if (provider === 'free') {
                        if (modelType === 'pro') modelName = 'meta-llama/llama-3.3-70b-instruct';
                        else if (modelType === 'gemma') modelName = 'google/gemma-4-31b-it';
                        else modelName = 'openrouter/free';
                    }

                    const maxTokensLimit = provider === 'gemini' ? 5000 : 4000;

                    let openRouterMessages = [];
                    if (systemInstruction.trim()) {
                        openRouterMessages.push({ role: 'system', content: systemInstruction });
                    }

                    const history = activeChat?.messages.slice(-10) || [];
                    for (const msg of history) {
                        if (msg.role === 'user') {
                            let histContent;
                            if (msg.attachments && msg.attachments.length > 0) {
                                histContent = [];
                                if (msg.text) histContent.push({ type: 'text', text: msg.text });
                                msg.attachments.forEach(att => {
                                    histContent.push({ type: 'image_url', image_url: { url: att.base64 } });
                                });
                            } else {
                                histContent = msg.text || " ";
                            }
                            openRouterMessages.push({ role: 'user', content: histContent });
                        } else if (msg.role === 'model') {
                            openRouterMessages.push({ role: 'assistant', content: msg.text || " " });
                        }
                    }

                    let currentContent;
                    if (activeAttachments.length > 0) {
                        currentContent = [];
                        if (userText) currentContent.push({ type: 'text', text: userText });
                        activeAttachments.forEach(att => {
                            currentContent.push({ type: 'image_url', image_url: { url: att.base64 } });
                        });
                    } else {
                        currentContent = userText;
                    }
                    openRouterMessages.push({ role: 'user', content: currentContent });

                    const res = await fetch("https://openrouter.ai/api/v1/chat/completions", { 
                        method: 'POST', 
                        headers: { 
                            'Authorization': `Bearer ${apiKey}`,
                            'HTTP-Referer': window.location.href,
                            'X-Title': 'AI Workspace',
                            'Content-Type': 'application/json' 
                        }, 
                        body: JSON.stringify({
                            model: modelName,
                            messages: openRouterMessages,
                            max_tokens: maxTokensLimit,
                            stream: true 
                        }),
                        signal: controller.signal
                    });
                    
                    if (!res.ok) {
                        const errorData = await res.json();
                        throw new Error(errorData.error?.message || t.requestError);
                    }

                    let fullResponseText = "";
                    let displayedText = "";
                    let isStreamFinished = false;
                    let genId = null;

                    const updateUI = () => {
                        if (displayedText.length < fullResponseText.length) {
                            const diff = fullResponseText.length - displayedText.length;
                            const charsToReveal = Math.max(1, Math.floor(diff / 3)); 
                            displayedText = fullResponseText.slice(0, displayedText.length + charsToReveal);
                            
                            setChats(prev => prev.map(c => {
                                if (c.id === currentChatId) {
                                    const newMsgs = [...c.messages];
                                    newMsgs[newMsgs.length - 1] = { ...newMsgs[newMsgs.length - 1], text: displayedText, isThinking: false };
                                    return { ...c, messages: newMsgs };
                                }
                                return c;
                            }));
                        }
                        
                        if (!isStreamFinished || displayedText.length < fullResponseText.length) {
                            if (abortControllerRef.current === controller) {
                                requestAnimationFrame(updateUI);
                            }
                        } else {
                            setIsGenerating(false);
                            if (abortControllerRef.current === controller) {
                                abortControllerRef.current = null;
                            }
                            if (genId && currentProvider !== 'free') {
                                setChats(prev => {
                                     const chat = prev.find(c => c.id === currentChatId);
                                     if (chat) setTimeout(() => pollCost(genId, currentChatId, chat.messages.length - 1), 0);
                                     return prev;
                                });
                            }
                        }
                    };
                    
                    requestAnimationFrame(updateUI);

                    const reader = res.body.getReader();
                    const decoder = new TextDecoder("utf-8");
                    let isFirstChunk = true;
                    let buffer = "";

                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;
                        
                        buffer += decoder.decode(value, { stream: true });
                        const lines = buffer.split('\n');
                        buffer = lines.pop(); 
                        
                        for (const line of lines) {
                            if (line.trim() === '') continue;
                            if (line.startsWith('data: ')) {
                                const dataStr = line.slice(6);
                                if (dataStr.trim() === '[DONE]') continue;
                                
                                try {
                                    const data = JSON.parse(dataStr);
                                    if (!genId && data.id) genId = data.id;
                                    
                                    if (isFirstChunk) {
                                        setIsLoading(false);
                                        isFirstChunk = false;
                                        setChats(prev => prev.map(c => {
                                            if (c.id === currentChatId) {
                                                const newMsgs = [...c.messages];
                                                newMsgs[newMsgs.length - 1] = { ...newMsgs[newMsgs.length - 1], actualModel: data.model || "", isThinking: false };
                                                return { ...c, messages: newMsgs };
                                            }
                                            return c;
                                        }));
                                    }

                                    const delta = data.choices?.[0]?.delta?.content || "";
                                    if (delta) {
                                        fullResponseText += delta; 
                                    }
                                } catch (e) {
                                }
                            }
                        }
                    }
                    isStreamFinished = true;

                } catch (e) {
                    isStreamFinished = true;
                    if (e.name === 'AbortError') {
                        setChats(prev => prev.map(c => c.id === activeChatId ? { ...c, messages: [...c.messages, { role: 'model', text: t.reqStopped, isError: true, isThinking: false }] } : c));
                    } else {
                        setChats(prev => prev.map(c => c.id === activeChatId ? { ...c, messages: [...c.messages, { role: 'model', text: `⚠️ ${t.errorPrefix}${e.message}`, isError: true, isThinking: false }] } : c));
                    }
                    setIsGenerating(false);
                } finally { 
                    setIsLoading(false); 
                    fetchBalance(); 
                }
            };

            const modelDisplay = useMemo(() => {
                if (provider === 'gemini') return modelType === 'pro' ? 'Pro 3.1' : 'Flash 3';
                if (provider === 'chatgpt') return modelType === 'pro' ? 'o4-mini' : '5.4-mini';
                if (provider === 'deepseek') return modelType === 'pro' ? 'R1' : 'Chat V3.1';
                if (provider === 'free') {
                    if (modelType === 'pro') return 'Llama 3.3';
                    if (modelType === 'gemma') return 'Gemma 4';
                    return 'Auto';
                }
                return 'Flash';
            }, [provider, modelType]);
            
            const providerName = useMemo(() => {
                if (provider === 'gemini') return 'Gemini';
                if (provider === 'chatgpt') return 'ChatGPT';
                if (provider === 'deepseek') return 'DeepSeek';
                if (provider === 'free') return t.freeModelsLabel;
                return 'Gemini';
            }, [provider, t]);

            const balancePercentage = useMemo(() => {
                if (!balanceData || balanceData.limit <= 0) return 0;
                return Math.min((balanceData.usage / balanceData.limit) * 100, 100);
            }, [balanceData]);

            return (
                <div className="flex h-screen w-full text-[var(--text-primary)] bg-[var(--bg-body)] overflow-hidden">
                    <button 
                        onClick={() => setSafeMode(!safeMode)} 
                        className="fixed bottom-0 right-0 w-6 h-6 z-[100] cursor-default opacity-5 hover:opacity-100 transition-opacity duration-500 bg-[var(--safe-btn)]"
                        title="Toggle View"
                    ></button>

                    {safeMode && (
                        <div 
                            className="hidden md:block fixed top-0 left-0 w-4 h-full z-[60]"
                            onMouseEnter={() => setIsSidebarHovered(true)}
                        ></div>
                    )}

                    <aside 
                        className={`
                            fixed inset-y-0 left-0 z-50 w-[300px] bg-[var(--bg-sidebar)] transition-transform duration-300 flex flex-col border-r border-transparent
                            ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full'}
                            ${safeMode 
                                ? `md:fixed ${isSidebarHovered ? 'md:translate-x-0 shadow-2xl' : 'md:-translate-x-[300px]'}` 
                                : 'md:translate-x-0 md:static'
                            }
                        `}
                        onMouseLeave={() => safeMode && setIsSidebarHovered(false)}
                        onMouseEnter={() => safeMode && setIsSidebarHovered(true)}
                    >
                        <div className="p-4 pt-6">
                            <button onClick={createNewChat} className="flex items-center gap-3 w-fit px-4 py-3 bg-[var(--hover-bg)] hover:bg-opacity-80 rounded-full transition-colors text-sm font-medium text-[var(--text-secondary)] hover:text-[var(--text-primary)]">
                                <Icon name={safeMode ? "edit-3" : "plus"} className="w-5 h-5" />
                                <span className="pr-2">{safeMode ? t.newChatSafe : t.newChat}</span>
                            </button>
                        </div>
                        <div className="flex-1 overflow-y-auto px-2 space-y-1">
                            <div className="px-4 py-2 text-xs font-medium text-[var(--text-secondary)] uppercase tracking-wider">{t.recent}</div>
                            {chats.map(chat => (
                                <div key={chat.id} onClick={() => handleSwitchChat(chat.id)} className={`group flex items-center justify-between p-3 px-4 rounded-full cursor-pointer text-sm transition-all ${activeChatId === chat.id ? 'bg-[var(--active-chat-bg)] text-[var(--active-chat-text)] font-medium' : 'hover:bg-[var(--hover-bg)] text-[var(--text-primary)]'}`}>
                                    <div className="flex items-center gap-3 truncate">
                                        <Icon name={safeMode ? "file-text" : "message-square"} className="w-4 h-4 opacity-70" />
                                        <span className="truncate max-w-[160px]">{chat.title || t.newChat}</span>
                                    </div>
                                    {activeChatId === chat.id && <button onClick={(e) => deleteChat(e, chat.id)} className="opacity-70 hover:opacity-100"><Icon name="trash-2" className="w-4 h-4" /></button>}
                                </div>
                            ))}
                        </div>
                        <div className="p-4 mt-auto border-t border-[var(--border-color)] flex flex-col">
                            <button onClick={openSettings} className="flex items-center gap-3 w-full p-3 rounded-lg hover:bg-[var(--hover-bg)] transition-colors text-sm text-[var(--text-primary)]">
                                <Icon name="settings" className="w-5 h-5 text-[var(--text-secondary)]" />
                                <span>{t.settings}</span>
                            </button>
                            
                            {!safeMode && (
                                <div 
                                    className="mt-4 px-3 flex flex-col gap-2 cursor-pointer hover:opacity-80 transition-opacity"
                                    onClick={fetchBalance}
                                    title="Нажмите, чтобы обновить"
                                >
                                    <div className="flex items-center justify-between text-[11px] font-mono text-[var(--text-secondary)]">
                                        <span>{t.balanceLabel}</span>
                                        <span>
                                            {balanceData 
                                                ? `$${balanceData.usage.toFixed(3)} / $${balanceData.limit.toFixed(0)}` 
                                                : '...'}
                                        </span>
                                    </div>
                                    <div className="w-full h-1.5 bg-[var(--border-color)] rounded-full overflow-hidden">
                                        <div 
                                            className="h-full bg-[var(--accent-blue)] transition-all duration-500 ease-out"
                                            style={{ width: `${balancePercentage}%` }}
                                        ></div>
                                    </div>
                                </div>
                            )}
                            
                            <div className="mt-6 text-center text-[10px] text-[var(--text-secondary)] opacity-40 font-mono tracking-widest cursor-default">
                                {APP_VERSION}
                            </div>
                        </div>
                    </aside>

                    <main className="flex-1 flex flex-col relative h-full">
                        <div className="md:hidden flex items-center justify-between p-4 bg-[var(--bg-body)]">
                            <button onClick={() => setIsSidebarOpen(!isSidebarOpen)}><Icon name="menu" className="w-6 h-6 text-[var(--text-secondary)]" /></button>
                            <span className="font-medium text-[var(--text-primary)]">{safeMode ? 'Workspace' : providerName}</span>
                            <div className="w-8"></div> 
                        </div>

                        <div className="hidden md:flex justify-between items-center p-4 absolute top-0 left-0 right-0 z-10 bg-[var(--bg-body)]">
                            <div className="relative">
                                {safeMode ? (
                                     <div className="flex items-center gap-2 px-3 py-2 text-[var(--text-primary)]">
                                        <span className="text-lg font-medium">Workspace</span>
                                     </div>
                                ) : (
                                    <button onClick={() => setIsModelMenuOpen(!isModelMenuOpen)} className="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-[var(--hover-bg)] text-[var(--text-secondary)] hover:text-[var(--text-primary)] transition-colors">
                                        <ProviderIcon provider={provider} theme={theme} className={`w-5 h-5`} active={true} />
                                        <span className="text-lg font-medium ml-2">{providerName}</span>
                                        <span className={`text-sm px-2 py-0.5 rounded ml-2 ${modelType === 'pro' || modelType === 'gemma' ? 'bg-[var(--text-primary)] text-[var(--bg-body)]' : 'bg-[var(--border-color)] text-[var(--text-primary)]'}`}>{modelDisplay}</span>
                                        <Icon name="chevron-down" className={`w-4 h-4 transition-transform ml-1 ${isModelMenuOpen ? 'rotate-180' : ''}`} />
                                    </button>
                                )}
                                {isModelMenuOpen && !safeMode && (
                                    <div className="absolute top-full left-0 mt-2 w-72 bg-[var(--tool-menu-bg)] border border-[var(--border-color)] rounded-xl shadow-2xl p-2 z-50 animate-slide-up">
                                        {provider === 'gemini' ? (
                                            <>
                                                <button onClick={() => { setModelType('flash'); setIsModelMenuOpen(false); }} className={`flex items-start gap-3 w-full p-3 rounded-lg hover:bg-[var(--hover-bg)] text-left transition-colors ${modelType === 'flash' ? 'bg-[var(--hover-bg)]' : ''}`}>
                                                    <GeminiIcon className={`w-5 h-5 mt-0.5`} active={modelType === 'flash'} />
                                                    <div><div className="text-sm font-medium text-[var(--text-primary)]">Gemini 3 Flash</div><div className="text-xs text-[var(--text-secondary)] mt-1">{t.modelFlash}</div></div>
                                                </button>
                                                <button onClick={() => { setModelType('pro'); setIsModelMenuOpen(false); }} className={`flex items-start gap-3 w-full p-3 rounded-lg hover:bg-[var(--hover-bg)] text-left transition-colors ${modelType === 'pro' ? 'bg-[var(--hover-bg)]' : ''}`}>
                                                    <GeminiIcon className={`w-5 h-5 mt-0.5`} active={modelType === 'pro'} />
                                                    <div><div className="text-sm font-medium text-[var(--text-primary)]">Gemini 3.1 Pro</div><div className="text-xs text-[var(--text-secondary)] mt-1">{t.modelPro}</div></div>
                                                </button>
                                            </>
                                        ) : provider === 'chatgpt' ? (
                                            <>
                                                <button onClick={() => { setModelType('flash'); setIsModelMenuOpen(false); }} className={`flex items-start gap-3 w-full p-3 rounded-lg hover:bg-[var(--hover-bg)] text-left transition-colors ${modelType === 'flash' ? 'bg-[var(--hover-bg)]' : ''}`}>
                                                    <ChatGPTIcon className={`w-5 h-5 mt-0.5`} active={modelType === 'flash'} />
                                                    <div><div className="text-sm font-medium text-[var(--text-primary)]">ChatGPT 5.4-mini</div><div className="text-xs text-[var(--text-secondary)] mt-1">{t.chatgptFlash}</div></div>
                                                </button>
                                                <button onClick={() => { setModelType('pro'); setIsModelMenuOpen(false); }} className={`flex items-start gap-3 w-full p-3 rounded-lg hover:bg-[var(--hover-bg)] text-left transition-colors ${modelType === 'pro' ? 'bg-[var(--hover-bg)]' : ''}`}>
                                                    <ChatGPTIcon className={`w-5 h-5 mt-0.5`} active={modelType === 'pro'} />
                                                    <div><div className="text-sm font-medium text-[var(--text-primary)]">ChatGPT o4-mini</div><div className="text-xs text-[var(--text-secondary)] mt-1">{t.chatgptPro}</div></div>
                                                </button>
                                            </>
                                        ) : provider === 'deepseek' ? (
                                            <>
                                                <button onClick={() => { setModelType('flash'); setIsModelMenuOpen(false); }} className={`flex items-start gap-3 w-full p-3 rounded-lg hover:bg-[var(--hover-bg)] text-left transition-colors ${modelType === 'flash' ? 'bg-[var(--hover-bg)]' : ''}`}>
                                                    <DeepSeekIcon className={`w-5 h-5 mt-0.5`} active={modelType === 'flash'} />
                                                    <div><div className="text-sm font-medium text-[var(--text-primary)]">DeepSeek Chat</div><div className="text-xs text-[var(--text-secondary)] mt-1">{t.deepseekChatDesc}</div></div>
                                                </button>
                                                <button onClick={() => { setModelType('pro'); setIsModelMenuOpen(false); }} className={`flex items-start gap-3 w-full p-3 rounded-lg hover:bg-[var(--hover-bg)] text-left transition-colors ${modelType === 'pro' ? 'bg-[var(--hover-bg)]' : ''}`}>
                                                    <DeepSeekIcon className={`w-5 h-5 mt-0.5`} active={modelType === 'pro'} />
                                                    <div><div className="text-sm font-medium text-[var(--text-primary)]">DeepSeek R1</div><div className="text-xs text-[var(--text-secondary)] mt-1">{t.deepseekR1Desc}</div></div>
                                                </button>
                                            </>
                                        ) : (
                                            <>
                                                <button onClick={() => { setModelType('flash'); setIsModelMenuOpen(false); }} className={`flex items-start gap-3 w-full p-3 rounded-lg hover:bg-[var(--hover-bg)] text-left transition-colors ${modelType === 'flash' ? 'bg-[var(--hover-bg)]' : ''}`}>
                                                    <RouterIcon className={`w-5 h-5 mt-0.5`} active={modelType === 'flash'} theme={theme} />
                                                    <div><div className="text-sm font-medium text-[var(--text-primary)]">{t.freeAutoLabel}</div><div className="text-xs text-[var(--text-secondary)] mt-1">{t.freeAutoDesc}</div></div>
                                                </button>
                                                <button onClick={() => { setModelType('gemma'); setIsModelMenuOpen(false); }} className={`flex items-start gap-3 w-full p-3 rounded-lg hover:bg-[var(--hover-bg)] text-left transition-colors ${modelType === 'gemma' ? 'bg-[var(--hover-bg)]' : ''}`}>
                                                    <GemmaIcon className={`w-5 h-5 mt-0.5`} active={modelType === 'gemma'} />
                                                    <div><div className="text-sm font-medium text-[var(--text-primary)]">Gemma 4</div><div className="text-xs text-[var(--text-secondary)] mt-1">{t.freeGemmaDesc}</div></div>
                                                </button>
                                                <button onClick={() => { setModelType('pro'); setIsModelMenuOpen(false); }} className={`flex items-start gap-3 w-full p-3 rounded-lg hover:bg-[var(--hover-bg)] text-left transition-colors ${modelType === 'pro' ? 'bg-[var(--hover-bg)]' : ''}`}>
                                                    <MetaIcon className={`w-5 h-5 mt-0.5`} active={modelType === 'pro'} />
                                                    <div><div className="text-sm font-medium text-[var(--text-primary)]">Llama 3.3</div><div className="text-xs text-[var(--text-secondary)] mt-1">{t.freeLlamaDesc}</div></div>
                                                </button>
                                            </>
                                        )}
                                    </div>
                                )}
                            </div>
                            <div className="flex items-center gap-4">
                                {!safeMode && (
                                    <a href="https://openrouter.ai" target="_blank" className="flex items-center gap-2 p-2 rounded-lg hover:bg-[var(--hover-bg)] text-[var(--text-secondary)] hover:text-[var(--text-primary)] transition-colors" title={t.officialSite}>
                                        <span className="text-sm font-medium">{t.officialSite}</span>
                                        <Icon name="external-link" className="w-4 h-4" />
                                    </a>
                                )}
                            </div>
                        </div>

                        <div className="flex-1 overflow-y-auto px-4 pt-20 pb-32 scrollbar-hide" ref={chatContainerRef} onScroll={handleChatScroll}>
                            <div className="max-w-[700px] mx-auto">
                                {!isChatsLoaded ? (
                                    <div className="flex justify-center mt-20 text-[var(--text-secondary)]">...</div>
                                ) : activeChat?.messages.length === 0 ? (
                                    <div className="flex flex-col items-center justify-center mt-20 animate-slide-up">
                                        {safeMode ? (
                                            <div className="text-center opacity-30 mt-32">
                                                 <Icon name="pen-tool" className="w-16 h-16 mx-auto mb-4" />
                                                 <p>Начни печатать, чтобы создать заметку...</p>
                                            </div>
                                        ) : (
                                            <>
                                                <h1 className="text-5xl font-medium text-transparent bg-clip-text bg-gradient-to-r from-[#4285f4] via-[#9b72cb] to-[#d96570] mb-4 text-center">{t.greeting}, {nickname || t.guest}</h1>
                                                <p className="text-2xl text-[var(--text-secondary)]">{t.helpPrompt}</p>
                                            </>
                                        )}
                                    </div>
                                ) : (
                                    activeChat?.messages.map((msg, idx) => {
                                        let MsgIconProvider = msg.provider || provider;
                                        if (msg.provider === 'free') {
                                            if (msg.modelType === 'gemma') MsgIconProvider = 'gemma';
                                            else if (msg.modelType === 'pro') MsgIconProvider = 'meta';
                                            else MsgIconProvider = 'router';
                                        }

                                        return (
                                            <div key={idx} className="mb-8 animate-slide-up">
                                                {msg.role === 'user' && (
                                                    <div className="flex flex-col items-end mb-2">
                                                        {msg.attachments && msg.attachments.length > 0 && (
                                                            <div className="flex flex-wrap gap-2 justify-end mb-2 max-w-[80%]">
                                                                {msg.attachments.map((att, i) => (
                                                                    <img key={i} src={att.base64} className="max-w-[200px] max-h-[200px] object-cover rounded-2xl border border-[var(--border-color)] shadow-sm" alt="User upload" />
                                                                ))}
                                                            </div>
                                                        )}
                                                        {msg.text && (
                                                            <div className="bg-[var(--bg-user-msg)] text-[var(--text-primary)] rounded-[20px] rounded-br-[4px] px-5 py-3 max-w-[80%]">
                                                                <div className="whitespace-pre-wrap break-words">{msg.text}</div>
                                                            </div>
                                                        )}
                                                    </div>
                                                )}
                                                {msg.role === 'model' && (
                                                    <div className="flex gap-4 group">
                                                        {!safeMode && (
                                                            <div className="w-8 h-8 rounded-full flex-shrink-0 mt-1 flex items-center justify-center bg-[var(--bg-sidebar)]">
                                                                <ProviderIcon provider={MsgIconProvider} theme={theme} className={`w-5 h-5`} />
                                                            </div>
                                                        )}
                                                        <div className={`flex-1 overflow-visible relative ${msg.isError ? 'text-red-400' : 'text-[var(--text-primary)]'}`}>
                                                            {!safeMode && MsgIconProvider === 'router' && msg.actualModel && (
                                                                <div className="text-[10px] text-[var(--text-secondary)] mb-1 opacity-60 font-mono tracking-wide">
                                                                    {msg.actualModel}
                                                                </div>
                                                            )}
                                                            
                                                            {msg.isThinking ? (
                                                                <div className="flex items-center gap-1.5 h-7 px-2">
                                                                    <div className="w-2 h-2 bg-[var(--text-secondary)] rounded-full animate-bounce"></div>
                                                                    <div className="w-2 h-2 bg-[var(--text-secondary)] rounded-full animate-bounce" style={{ animationDelay: '0.15s' }}></div>
                                                                    <div className="w-2 h-2 bg-[var(--text-secondary)] rounded-full animate-bounce" style={{ animationDelay: '0.3s' }}></div>
                                                                </div>
                                                            ) : (
                                                                <MarkdownRenderer content={msg.text} />
                                                            )}
                                                            
                                                            {!safeMode && !msg.isError && !msg.isThinking && msg.provider !== 'free' && msg.cost > 0 && (
                                                                <div className="mt-2 flex items-center gap-1.5 w-fit bg-[var(--cost-bg)] border border-[var(--border-color)] px-2 py-0.5 rounded-full transition-opacity duration-200 opacity-0 group-hover:opacity-100">
                                                                    <Icon name="credit-card" className="w-3 h-3 text-[var(--text-secondary)]" />
                                                                    <span className="text-[10px] font-mono text-[var(--text-secondary)] leading-none">
                                                                        {msg.cost > 0 ? `$${msg.cost.toFixed(6)}` : '...'}
                                                                    </span>
                                                                </div>
                                                            )}
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                        )
                                    })
                                )}
                            </div>
                        </div>

                        <div className="absolute bottom-0 left-0 right-0 bg-[var(--bg-body)] p-4 pb-6">
                            <div className="max-w-[760px] mx-auto relative">
                                {attachments.length > 0 && (
                                    <div className="flex gap-3 mb-3 px-2 overflow-x-auto scrollbar-slim">
                                        {attachments.map((att, i) => (
                                            <div key={i} className="relative w-16 h-16 flex-shrink-0 group">
                                                <img src={att.base64} className="w-full h-full object-cover rounded-xl border border-[var(--border-color)]" alt="attachment" />
                                                <button onClick={() => setAttachments(prev => prev.filter((_, idx) => idx !== i))} className="absolute -top-2 -right-2 bg-red-500 text-white rounded-full p-1 opacity-0 group-hover:opacity-100 transition-opacity shadow-lg">
                                                    <Icon name="x" className="w-3 h-3" />
                                                </button>
                                            </div>
                                        ))}
                                    </div>
                                )}

                                <div className={`flex items-end gap-2 bg-[var(--bg-input)] rounded-[28px] p-2 pl-4 pb-2 border-none focus-within:shadow-none transition-all`}>
                                    {!safeMode && (
                                        <button onClick={() => document.getElementById('file-upload').click()} className="w-10 h-10 flex-shrink-0 flex items-center justify-center rounded-full text-[var(--text-secondary)] hover:text-[var(--text-primary)] hover:bg-[var(--hover-bg)] transition-colors mb-0.5" title={t.attachPhoto}>
                                            <Icon name="paperclip" className="w-5 h-5" />
                                        </button>
                                    )}
                                    <input type="file" id="file-upload" multiple accept="image/*" className="hidden" onChange={handleFileChange} />

                                    <textarea ref={textareaRef} value={input} onChange={(e) => setInput(e.target.value)} onKeyDown={(e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }} onPaste={handlePaste} placeholder={t.inputPlaceholder} className="flex-1 bg-transparent text-[var(--text-primary)] placeholder-[var(--text-secondary)] focus:outline-none resize-none py-2 px-1 min-h-[40px] max-h-[200px]" rows={1} style={{ height: 'auto' }} />
                                    
                                    {isGenerating ? (
                                        <button onClick={handleStopGeneration} className="w-10 h-10 flex-shrink-0 flex items-center justify-center rounded-full mr-1 transition-all text-[var(--text-secondary)] hover:text-red-400 hover:bg-red-500/10 mb-0.5" title={t.stop}>
                                            <div className="w-4 h-4 bg-current rounded-[2px]"></div>
                                        </button>
                                    ) : (
                                        <button onClick={sendMessage} disabled={!input.trim() && attachments.length === 0} className={`w-10 h-10 flex-shrink-0 flex items-center justify-center rounded-full mr-1 transition-all mb-0.5 ${input.trim() || attachments.length > 0 ? 'text-[var(--text-primary)] hover:bg-[var(--hover-bg)]' : 'text-[var(--text-secondary)] opacity-50'}`} title={t.send}><Icon name="send-horizontal" className="w-5 h-5" /></button>
                                    )}
                                </div>
                            </div>
                        </div>

                        {isSettingsOpen && (
                            <div className="fixed inset-0 bg-black/60 z-[100] flex items-center justify-center p-4 sm:p-6" onClick={() => setIsSettingsOpen(false)}>
                                <div className="bg-[var(--bg-surface)] rounded-2xl w-full max-w-lg border border-[var(--border-color)] shadow-2xl flex flex-col max-h-[90vh]" onClick={e => e.stopPropagation()}>
                                    <div className="p-6 border-b border-[var(--border-color)] flex justify-between items-center bg-[var(--bg-surface)] rounded-t-2xl z-10">
                                        <h2 className="text-xl font-bold">{t.settings}</h2>
                                        <button onClick={() => setIsSettingsOpen(false)} className="text-[var(--text-secondary)] hover:text-[var(--text-primary)] p-1 rounded-full hover:bg-[var(--hover-bg)] transition-colors"><Icon name="x" className="w-5 h-5" /></button>
                                    </div>
                                    
                                    <div className="p-6 overflow-y-auto space-y-8 scrollbar-slim">
                                        <div className="space-y-4">
                                            <h3 className="text-xs font-bold text-[var(--text-secondary)] uppercase tracking-wider">{t.settingsAI}</h3>
                                            
                                            <button 
                                                onClick={openMemoryModal}
                                                className="w-full flex items-center gap-4 p-4 bg-[var(--bg-input)] hover:bg-[var(--hover-bg)] rounded-xl transition-all text-left border border-[var(--border-color)] group"
                                            >
                                                <div className="flex-shrink-0 w-10 h-10 flex items-center justify-center rounded-xl transition-colors" style={{background: 'color-mix(in srgb, var(--accent-blue) 15%, transparent)'}}>
                                                    <BotIcon className="w-5 h-5" />
                                                </div>
                                                <div className="flex-1">
                                                    <div className="font-medium text-[var(--text-primary)]">{t.systemInstructions}</div>
                                                    <div className="text-xs text-[var(--text-secondary)] mt-0.5">{t.sysInstDescription}</div>
                                                </div>
                                                <div className="flex-shrink-0">
                                                    <Icon name="chevron-right" className="w-4 h-4 text-[var(--text-secondary)]" />
                                                </div>
                                            </button>

                                            <div>
                                                <label className="block text-sm mb-2 text-[var(--text-primary)] font-medium">{t.provider}</label>
                                                <div className="flex gap-1 p-1 bg-[var(--bg-sidebar)] rounded-xl border border-[var(--border-color)]">
                                                    <button onClick={() => setTempProvider('gemini')} className={`flex items-center justify-center py-2 flex-1 rounded-lg transition-all ${tempProvider === 'gemini' ? 'bg-[var(--bg-body)] shadow-sm text-[var(--text-primary)]' : 'opacity-50 hover:opacity-100 hover:bg-[var(--hover-bg)]'}`} title="Gemini">
                                                        <ProviderIcon provider="gemini" theme={tempTheme} className="w-5 h-5" active={tempProvider === 'gemini'} />
                                                    </button>
                                                    <button onClick={() => setTempProvider('chatgpt')} className={`flex items-center justify-center py-2 flex-1 rounded-lg transition-all ${tempProvider === 'chatgpt' ? 'bg-[var(--bg-body)] shadow-sm text-[var(--text-primary)]' : 'opacity-50 hover:opacity-100 hover:bg-[var(--hover-bg)]'}`} title="ChatGPT">
                                                        <ProviderIcon provider="chatgpt" theme={tempTheme} className="w-5 h-5" active={tempProvider === 'chatgpt'} />
                                                    </button>
                                                    <button onClick={() => setTempProvider('deepseek')} className={`flex items-center justify-center py-2 flex-1 rounded-lg transition-all ${tempProvider === 'deepseek' ? 'bg-[var(--bg-body)] shadow-sm text-[var(--text-primary)]' : 'opacity-50 hover:opacity-100 hover:bg-[var(--hover-bg)]'}`} title="DeepSeek">
                                                        <ProviderIcon provider="deepseek" theme={tempTheme} className="w-5 h-5" active={tempProvider === 'deepseek'} />
                                                    </button>
                                                    <button onClick={() => setTempProvider('free')} className={`flex items-center justify-center py-2 flex-1 rounded-lg transition-all ${tempProvider === 'free' ? 'bg-[var(--bg-body)] shadow-sm text-[var(--text-primary)]' : 'opacity-50 hover:opacity-100 hover:bg-[var(--hover-bg)]'}`} title={t.freeModelsLabel}>
                                                        <ProviderIcon provider="free" theme={tempTheme} className="w-5 h-5" active={tempProvider === 'free'} />
                                                    </button>
                                                </div>
                                                <div className="text-xs text-[var(--text-secondary)] mt-3 leading-relaxed bg-[var(--bg-input)] p-3 rounded-lg border border-[var(--border-color)]">
                                                    {tempProvider === 'gemini' && t.descGemini}
                                                    {tempProvider === 'chatgpt' && t.descChatGPT}
                                                    {tempProvider === 'deepseek' && t.descDeepSeek}
                                                    {tempProvider === 'free' && t.descFree}
                                                </div>
                                            </div>
                                        </div>

                                        <div className="h-px bg-[var(--border-color)] opacity-50"></div>

                                        <div className="space-y-4">
                                            <h3 className="text-xs font-bold text-[var(--text-secondary)] uppercase tracking-wider">{t.settingsAppearance}</h3>
                                            
                                            <div className="grid grid-cols-2 gap-4">
                                                <div>
                                                    <label className="block text-sm mb-2 text-[var(--text-primary)] font-medium">{t.theme}</label>
                                                    <div className="flex gap-1 p-1 bg-[var(--bg-sidebar)] rounded-xl border border-[var(--border-color)]">
                                                        <button onClick={() => setTempTheme('light')} className={`flex-1 py-2 rounded-lg text-sm transition-all ${tempTheme === 'light' ? 'bg-[var(--bg-body)] shadow-sm text-[var(--text-primary)] font-medium' : 'text-[var(--text-secondary)] hover:text-[var(--text-primary)] hover:bg-[var(--hover-bg)]'}`}>Light</button>
                                                        <button onClick={() => setTempTheme('dark')} className={`flex-1 py-2 rounded-lg text-sm transition-all ${tempTheme === 'dark' ? 'bg-[var(--bg-body)] shadow-sm text-[var(--text-primary)] font-medium' : 'text-[var(--text-secondary)] hover:text-[var(--text-primary)] hover:bg-[var(--hover-bg)]'}`}>Dark</button>
                                                    </div>
                                                </div>
                                                <div>
                                                    <label className="block text-sm mb-2 text-[var(--text-primary)] font-medium">{t.language}</label>
                                                    <div className="flex gap-1 p-1 bg-[var(--bg-sidebar)] rounded-xl border border-[var(--border-color)]">
                                                        <button onClick={() => setTempLanguage('ru')} className={`flex-1 py-2 rounded-lg text-sm transition-all ${tempLanguage === 'ru' ? 'bg-[var(--bg-body)] shadow-sm text-[var(--text-primary)] font-medium' : 'text-[var(--text-secondary)] hover:text-[var(--text-primary)] hover:bg-[var(--hover-bg)]'}`}>Русский</button>
                                                        <button onClick={() => setTempLanguage('en')} className={`flex-1 py-2 rounded-lg text-sm transition-all ${tempLanguage === 'en' ? 'bg-[var(--bg-body)] shadow-sm text-[var(--text-primary)] font-medium' : 'text-[var(--text-secondary)] hover:text-[var(--text-primary)] hover:bg-[var(--hover-bg)]'}`}>English</button>
                                                    </div>
                                                </div>
                                            </div>

                                            <div>
                                                <label className="block text-sm mb-2 text-[var(--text-primary)] font-medium">{t.tabTitleSetting}</label>
                                                <input type="text" value={tempTabTitle} onChange={e => setTempTabTitle(e.target.value)} placeholder={t.tabTitlePlaceholder} className="w-full p-3.5 rounded-xl bg-[var(--bg-input)] border border-[var(--border-color)] text-[var(--text-primary)] focus:outline-none focus:border-[var(--accent-blue)] text-sm transition-colors" />
                                            </div>
                                        </div>

                                        <div className="h-px bg-[var(--border-color)] opacity-50"></div>

                                        <div className="space-y-4">
                                            <h3 className="text-xs font-bold text-[var(--text-secondary)] uppercase tracking-wider">{t.settingsData}</h3>
                                            
                                            <div>
                                                <label className="block text-sm mb-2 text-[var(--text-primary)] font-medium">{t.yourName}</label>
                                                <input type="text" value={tempNickname} onChange={e => setTempNickname(e.target.value)} className="w-full p-3.5 rounded-xl bg-[var(--bg-input)] border border-[var(--border-color)] text-[var(--text-primary)] focus:outline-none focus:border-[var(--accent-blue)] text-sm transition-colors" />
                                            </div>
                                            <div>
                                                <label className="block text-sm mb-2 text-[var(--text-primary)] font-medium">{t.apiKey}</label>
                                                <input type="password" value={tempApiKey} onChange={e => setTempApiKey(e.target.value)} className="w-full p-3.5 rounded-xl bg-[var(--bg-input)] border border-[var(--border-color)] text-[var(--text-primary)] focus:outline-none focus:border-[var(--accent-blue)] font-mono text-sm transition-colors" />
                                            </div>
                                        </div>

                                    </div>
                                    
                                    <div className="p-6 border-t border-[var(--border-color)] flex justify-between items-center gap-4 bg-[var(--bg-surface)] rounded-b-2xl z-10">
                                        <button onClick={clearAllHistory} className="px-5 py-2.5 text-red-400 bg-red-500/10 hover:bg-red-500/20 rounded-full text-sm font-medium transition-colors">{t.clearHistory}</button>
                                        <button onClick={saveSettings} className="px-8 py-2.5 bg-[var(--accent-blue)] text-[#000] rounded-full font-medium hover:opacity-90 transition-opacity ml-auto">{t.save}</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {isMemoryModalOpen && (
                            <div className="fixed inset-0 bg-black/60 z-[110] flex items-center justify-center p-4" onClick={() => setIsMemoryModalOpen(false)}>
                                <div className="bg-[var(--bg-surface)] p-0 rounded-2xl w-full max-w-2xl border border-[var(--border-color)] shadow-2xl flex flex-col max-h-[80vh]" onClick={e => e.stopPropagation()}>
                                    <div className="p-6 border-b border-[var(--border-color)] flex justify-between items-center">
                                        <h2 className="text-xl font-bold">{t.systemInstructions}</h2>
                                        <button onClick={() => setIsMemoryModalOpen(false)} className="text-[var(--text-secondary)] hover:text-[var(--text-primary)] p-1 rounded-full hover:bg-[var(--hover-bg)] transition-colors"><Icon name="x" className="w-5 h-5" /></button>
                                    </div>
                                    <div className="p-6 flex-1 overflow-y-auto">
                                        <textarea 
                                            value={tempSystemInstruction} 
                                            onChange={e => setTempSystemInstruction(e.target.value)} 
                                            placeholder={t.sysInstPlaceholder}
                                            className="w-full h-64 p-4 rounded-xl bg-[var(--bg-input)] border border-[var(--border-color)] text-[var(--text-primary)] focus:outline-none focus:border-[var(--accent-blue)] resize-none leading-relaxed"
                                            autoFocus
                                        />
                                        <p className="mt-4 text-sm text-[var(--text-secondary)]">
                                            {t.sysInstDescription}
                                        </p>
                                    </div>
                                    <div className="p-6 border-t border-[var(--border-color)] flex justify-end gap-3">
                                        <button onClick={() => setIsMemoryModalOpen(false)} className="px-6 py-2.5 text-[var(--text-primary)] hover:bg-[var(--hover-bg)] rounded-full transition-colors font-medium">{t.cancel}</button>
                                        <button onClick={saveMemory} className="px-8 py-2.5 bg-[var(--accent-blue)] text-[#000] rounded-full font-medium hover:opacity-90 transition-opacity">{t.save}</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {isWelcomeModalOpen && (
                            <div className="fixed inset-0 bg-black/90 z-[150] flex items-center justify-center p-4">
                                <div className="bg-[var(--bg-surface)] p-8 rounded-3xl w-full max-w-md border border-[var(--border-color)] shadow-2xl text-center">
                                    <div className="mb-6"><GeminiIcon className="w-14 h-14 mx-auto animate-pulse" active={true} /></div>
                                    <h2 className="text-2xl font-bold mb-2">{t.welcome}</h2>
                                    <p className="text-[var(--text-secondary)] mb-8">{t.askName}</p>
                                    <input type="text" value={nickname} onChange={e => setNickname(e.target.value)} placeholder={t.namePlaceholder} className="w-full p-4 rounded-xl bg-[var(--bg-input)] border border-[var(--border-color)] text-[var(--text-primary)] focus:outline-none focus:border-[var(--accent-blue)] text-center text-lg mb-6 transition-colors" onKeyDown={e => e.key === 'Enter' && saveNickname(nickname)} />
                                    <button onClick={() => saveNickname(nickname)} className="w-full py-4 bg-[var(--accent-blue)] text-[#000] rounded-xl font-bold hover:opacity-90 transition-opacity">{t.startChat}</button>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(
            <ErrorBoundary>
                <App />
            </ErrorBoundary>
        );
    </script>
</body>
</html>
